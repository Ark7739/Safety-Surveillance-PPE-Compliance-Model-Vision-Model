services:
  safetyvision:
    build: .
    container_name: safetyvision-ai
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./runs:/app/runs
      - ./datasets:/app/datasets
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=5000
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
